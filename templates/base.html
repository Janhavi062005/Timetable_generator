<!DOCTYPE html>
<html>
<head>
    <title>Smart Timetable</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Sidebar (hidden by default) */
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: -220px; /* hidden */
            background: #212529;
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
        }

        /* When active */
        .sidebar.active {
            left: 0;
        }

        /* Main content */
        .main-content {
            margin-left: 0;
            padding: 20px;
        }

        /* Toggle button */
        .toggle-btn {
            background: #212529;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Optional: overlay background */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }
    </style>
</head>

<body>

<!-- ✅ Toggle Button -->
<button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>

<!-- ✅ Overlay -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- ✅ Sidebar -->
<div id="sidebar" class="sidebar text-white">

    <h4>  Admin Panel</h4>
    <hr>

    <a href="/generate-page" class="btn btn-outline-light w-100 mb-2">Add & Generate</a>
    <a href="/manage-data" class="btn btn-outline-light w-100 mb-2">Manage Data</a>
    <a href="/changes" class="btn btn-outline-light w-100 mb-2">Absence Management</a>
    <a href="/staff-view" class="btn btn-outline-light w-100 mb-2">Staff Panel</a>

</div>

<!-- ✅ Main Content -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<!-- ✅ Script -->
<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }
</script>

</body>
</html>
